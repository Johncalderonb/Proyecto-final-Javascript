<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Inicio de sesión — Rutas Seguras Kids" />
    <title>Iniciar sesión · Rutas Seguras Kids</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <div class="login-screen">
      <div class="login-card">

        <!-- Marca / Logo -->
        <div class="login-brand">
          <div class="login-logo">
            <img src="imagenes/logo.png" alt="Logo Rutas Seguras Kids" />
          </div>
          <h1 class="login-brand__nombre">KidGo</h1>
          <p class="login-brand__slogan">Sistema de Gestión de Transporte Escolar</p>
        </div>

        <!-- Selector de rol -->
        <div class="login-roles">
          <button class="login-rol__btn login-rol__btn--activo"
                  id="boton-rol-admin" data-rol="admin">
            🛡️ Administrador
          </button>
          <button class="login-rol__btn"
                  id="boton-rol-profesor" data-rol="profesor">
            👨‍🏫 Profesor
          </button>
        </div>

        <!-- Formulario de acceso -->
        <form class="formulario" id="formulario-login" novalidate>

          <p class="login-hint" id="texto-credenciales">
            Usuario: <strong>admin</strong> &nbsp;|&nbsp; Contraseña: <strong>admin123</strong>
          </p>

          <div class="formulario__grupo">
            <label class="formulario__etiqueta" for="campo-usuario">Usuario</label>
            <input class="formulario__campo" type="text" id="campo-usuario"
              placeholder="Ingresa tu usuario" autocomplete="username" />
            <span class="formulario__error" id="error-usuario"></span>
          </div>

          <div class="formulario__grupo">
            <label class="formulario__etiqueta" for="campo-contrasena">Contraseña</label>
            <div class="campo-contrasena-wrapper">
              <input class="formulario__campo" type="password" id="campo-contrasena"
                placeholder="Ingresa tu contraseña" autocomplete="current-password" />
              <button type="button" class="campo-contrasena__ojo" id="boton-ver-contrasena">👁️</button>
            </div>
            <span class="formulario__error" id="error-contrasena"></span>
          </div>

          <span class="formulario__error formulario__error--centrado" id="error-acceso"></span>

          <button class="boton boton--primario boton--ancho-completo" type="submit">
            Ingresar →
          </button>

        </form>

      </div>
    </div>

    <script src="almacenamiento.js"></script>
    <script src="autenticacion.js"></script>
    <script src="formularios.js"></script>
    <script src="inicio-sesion.js"></script>

  </body>
</html>
